<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혜쌤 Chinese · 중국어 회화 트레이너</title>
<style>
body{font-family:Arial, sans-serif;background:#f4f6fb;margin:0;padding:20px}
.container{max-width:760px;margin:auto}
header{text-align:center;margin-bottom:30px}
h1{margin:0;font-size:32px}
.subtitle{color:#666;margin-top:6px}
.card{background:white;border-radius:16px;padding:22px;margin-bottom:14px;box-shadow:0 6px 14px rgba(0,0,0,0.06)}
.chinese{font-size:28px;font-weight:700;margin-bottom:6px}
.korean{color:#555;margin-bottom:10px}
.controls{margin-top:10px}
button{padding:10px 16px;margin-right:8px;border:none;border-radius:10px;font-size:14px;cursor:pointer}
.play{background:#4CAF50;color:white}
.repeat{background:#2196F3;color:white}
.loop{background:#ff9800;color:white}
footer{text-align:center;color:#888;margin-top:40px;font-size:13px}
</style>
</head>
<body>
<div class="container">

<header>
<h1>혜쌤 Chinese</h1>
<div class="subtitle">중국어 회화 트레이너 · 중국 고객 응대 회화</div>
</header>

<div id="sentences"></div>

<footer>
듣기 → 따라 말하기 → 반복 듣기
</footer>

</div>

<script>
const data=[
{zh:"您好，欢迎光临",ko:"안녕하세요 어서 오세요"},
{zh:"请问需要帮忙吗？",ko:"도움이 필요하신가요"},
{zh:"这边请",ko:"이쪽으로 오세요"},
{zh:"请稍等一下",ko:"잠시만 기다려 주세요"},
{zh:"我帮您看一下",ko:"제가 확인해 보겠습니다"},
{zh:"需要中文服务吗？",ko:"중국어 서비스 필요하세요"},
{zh:"您找什么产品？",ko:"어떤 제품을 찾으세요"},
{zh:"我给您介绍一下",ko:"제가 설명해 드리겠습니다"},
{zh:"这个很受欢迎",ko:"이 제품은 인기가 많습니다"},
{zh:"可以试试",ko:"한번 사용해 보셔도 됩니다"},

{zh:"这是新的产品",ko:"이것은 신제품입니다"},
{zh:"这个质量很好",ko:"이 제품 품질이 좋습니다"},
{zh:"这个比较受欢迎",ko:"이 제품이 더 인기가 있습니다"},
{zh:"现在有活动",ko:"지금 행사 중입니다"},
{zh:"现在有折扣",ko:"지금 할인 중입니다"},
{zh:"这个很好卖",ko:"이 제품이 잘 나갑니다"},
{zh:"很多客人买这个",ko:"많은 손님이 이것을 삽니다"},
{zh:"可以看看这个",ko:"이것도 한번 보세요"},
{zh:"需要试试吗？",ko:"사용해 보시겠어요"},
{zh:"您觉得怎么样？",ko:"어떠세요"},

{zh:"一共多少钱",ko:"총 얼마인가요"},
{zh:"一共五万韩元",ko:"총 오만 원입니다"},
{zh:"可以刷卡",ko:"카드 결제 가능합니다"},
{zh:"可以现金",ko:"현금 결제도 가능합니다"},
{zh:"需要发票吗？",ko:"영수증 필요하세요"},
{zh:"请在这里签名",ko:"여기에 서명해 주세요"},
{zh:"稍等一下",ko:"잠시만 기다려 주세요"},
{zh:"马上帮您处理",ko:"곧 처리해 드리겠습니다"},
{zh:"已经准备好了",ko:"준비되었습니다"},
{zh:"请拿好",ko:"잘 챙겨 주세요"},

{zh:"谢谢您",ko:"감사합니다"},
{zh:"谢谢光临",ko:"방문해 주셔서 감사합니다"},
{zh:"欢迎再来",ko:"다시 오세요"},
{zh:"祝您今天愉快",ko:"좋은 하루 보내세요"},
{zh:"路上小心",ko:"조심히 가세요"},
{zh:"需要帮您打包吗？",ko:"포장해 드릴까요"},
{zh:"我帮您装好",ko:"제가 포장해 드리겠습니다"},
{zh:"请慢走",ko:"안녕히 가세요"},
{zh:"欢迎下次再来",ko:"다음에 또 오세요"},
{zh:"感谢您的光临",ko:"방문해 주셔서 감사합니다"},

{zh:"请问您需要什么？",ko:"무엇을 도와드릴까요"},
{zh:"我马上帮您看看",ko:"지금 확인해 드리겠습니다"},
{zh:"这个比较适合您",ko:"이것이 더 잘 맞습니다"},
{zh:"您可以慢慢看",ko:"천천히 보셔도 됩니다"},
{zh:"需要我说明吗？",ko:"설명해 드릴까요"},
{zh:"我给您推荐一个",ko:"하나 추천해 드리겠습니다"},
{zh:"这个很多中国客人买",ko:"중국 손님들이 많이 삽니다"},
{zh:"今天卖得很好",ko:"오늘 잘 팔리고 있습니다"},
{zh:"需要别的吗？",ko:"다른 것도 필요하세요"},
{zh:"好的我知道了",ko:"네 알겠습니다"}
];

const container=document.getElementById("sentences");

function speak(text){
const msg=new SpeechSynthesisUtterance(text);
msg.lang='zh-CN';
speechSynthesis.speak(msg);
}

function repeatSpeak(text,count=3){
let i=0;
function loop(){
if(i<count){
const msg=new SpeechSynthesisUtterance(text);
msg.lang='zh-CN';
msg.onend=()=>{i++;loop();};
speechSynthesis.speak(msg);
}
}
loop();
}

data.forEach((item,i)=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="chinese">${i+1}. ${item.zh}</div>
<div class="korean">${item.ko}</div>
<div class="controls">
<button class="play">듣기</button>
<button class="repeat">다시 듣기</button>
<button class="loop">3번 반복</button>
</div>
`;

card.querySelector(".play").onclick=()=>speak(item.zh);
card.querySelector(".repeat").onclick=()=>speak(item.zh);
card.querySelector(".loop").onclick=()=>repeatSpeak(item.zh,3);

container.appendChild(card);
});
</script>

</body>
</html>
